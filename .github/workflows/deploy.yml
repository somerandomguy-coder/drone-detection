name: Build and Deploy to GCP Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }} # GCP Project ID
  REGION: us-central1                        # Preferred Cloud Run region
  SERVICE_NAME: drone-detection              # Name of Cloud Run service
  GAR_REPO_NAME: drone-detection             # Name of Artifact Registry repository

jobs:
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest

    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------------------
      # AUTHENTICATION
      # Recommended approach: Workload Identity Federation (Passwordless & Secure)
      # Alternative: Service Account Key JSON stored in secrets.GCP_SA_KEY
      # -----------------------------------------------------------------------------------
      - name: Google Auth (Workload Identity Federation)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          # Uncomment the lines below if using Workload Identity Federation (Recommended):
          # workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          # service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          
          # OR use the Service Account Key JSON fallback (easiest for small portfolios):
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCP Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      # -----------------------------------------------------------------------------------
      # BUILD AND PUSH DOCKER IMAGE
      # -----------------------------------------------------------------------------------
      - name: Build and Push Container Image
        run: |
          IMAGE_TAG="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO_NAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          docker build -t "$IMAGE_TAG" .
          docker push "$IMAGE_TAG"
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      # -----------------------------------------------------------------------------------
      # DEPLOY TO GOOGLE CLOUD RUN
      # -----------------------------------------------------------------------------------
      - name: Deploy to GCP Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE_TAG }}
          flags: |
            --allow-unauthenticated
            --memory=2Gi
            --cpu=2
            --max-instances=3
            --port=8080

      - name: Show Service URL
        run: |
          echo "Your service is live at: ${{ steps.deploy.outputs.url }}"

      # -----------------------------------------------------------------------------------
      # DEPLOY FRONTEND TO FIREBASE HOSTING
      # -----------------------------------------------------------------------------------
      - name: Deploy Frontend to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.GCP_SA_KEY }}'
          projectId: '${{ env.PROJECT_ID }}'
          channelId: live
